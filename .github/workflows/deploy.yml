name: 部署到 GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 上传产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
